<!DOCTYPE html>
<html>
<head>
  <title>AniverseHub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #000;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 40px 20px;
      text-align: center;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 18px;
    }

    .card:hover {
      background: #333;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<header>🎬 AniverseHub</header>

<div class="container">
  <div class="card">🔥 Action Series</div>
  <div class="card">👻 Horror Series</div>
  <div class="card">😂 Comedy Series</div>
  <div class="card">⚡ Sci-Fi Series</div>
</div>

</body>
</html>
