<!DOCTYPE html>
<html>
<head>
  <title>AniverseHub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d0d0d;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: black;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      background: #333;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<header>🎬 AniverseHub</header>

<div class="container">
  <div class="card">Series 1</div>
  <div class="card">Series 2</div>
  <div class="card">Series 3</div>
  <div class="card">Series 4</div>
</div>

</body>
</html>
